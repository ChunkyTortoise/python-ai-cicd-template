# =============================================================================
# Integration Tests: Slower Tests That Hit External Services
# =============================================================================
# Runs after unit tests pass. Intended for tests that require databases,
# Redis, external APIs, or multi-service interactions.
#
# Customize:
#   - Add service containers (postgres, redis) in the services section
#   - Set real API keys as secrets for integration testing
#   - Adjust the pytest marker (-m integration) to match your convention
# =============================================================================

name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  PYTHON_VERSION: "3.12"

jobs:
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest

    # Uncomment to add service containers:
    # services:
    #   postgres:
    #     image: postgres:16
    #     env:
    #       POSTGRES_USER: test
    #       POSTGRES_PASSWORD: test
    #       POSTGRES_DB: testdb
    #     ports:
    #       - 5432:5432
    #     options: >-
    #       --health-cmd pg_isready
    #       --health-interval 10s
    #       --health-timeout 5s
    #       --health-retries 5
    #   redis:
    #     image: redis:7
    #     ports:
    #       - 6379:6379
    #     options: >-
    #       --health-cmd "redis-cli ping"
    #       --health-interval 10s
    #       --health-timeout 5s
    #       --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run integration tests
        env:
          # Stub keys for CI -- replace with real secrets for true integration tests
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || 'sk-test-key-for-ci-only' }}
          # DATABASE_URL: postgresql://test:test@localhost:5432/testdb
          # REDIS_URL: redis://localhost:6379
        run: |
          pytest -m integration -v --tb=short
