# =============================================================================
# Deploy: Render Deployment
# =============================================================================
# Triggers a Render deploy after Docker image is pushed. Polls the Render API
# until the deploy is live or fails (max 15 minutes).
#
# Required secrets:
#   - RENDER_API_KEY:       Render API key (from dashboard.render.com/account)
#   - DOCKERHUB_USERNAME:   Docker Hub username
#   - DOCKERHUB_TOKEN:      Docker Hub access token
#
# Required variables:
#   - RENDER_SERVICE_ID:    Your Render service ID (e.g., srv-abc123)
#
# Customize:
#   - Replace YOUR_DOCKERHUB_ORG/YOUR_SERVICE_NAME with your image name
#   - Set RENDER_SERVICE_ID in GitHub repository variables
#   - Adjust polling timeout (default 15 min) for slower services
# =============================================================================

name: Deploy to Render

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "Dockerfile"
      - ".github/workflows/deploy-render.yml"
  workflow_dispatch:
    inputs:
      force_deploy:
        description: "Force deploy even without file changes"
        required: false
        type: boolean
        default: false

concurrency:
  group: deploy-render
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build Docker + Deploy to Render
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tag
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          # TODO: Replace YOUR_DOCKERHUB_ORG/YOUR_SERVICE_NAME
          IMAGE="docker.io/YOUR_DOCKERHUB_ORG/YOUR_SERVICE_NAME:sha-${SHORT_SHA}"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            YOUR_DOCKERHUB_ORG/YOUR_SERVICE_NAME:sha-${{ steps.meta.outputs.short_sha }}
            YOUR_DOCKERHUB_ORG/YOUR_SERVICE_NAME:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Render deploy
        id: render
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          # TODO: Set RENDER_SERVICE_ID in GitHub repo variables
          RENDER_SERVICE_ID: ${{ vars.RENDER_SERVICE_ID }}
        run: |
          IMAGE="docker.io/YOUR_DOCKERHUB_ORG/YOUR_SERVICE_NAME:sha-${{ steps.meta.outputs.short_sha }}"
          echo "Triggering Render deploy for ${RENDER_SERVICE_ID}..."
          RESPONSE=$(curl -s -X POST \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"imageUrl\": \"${IMAGE}\"}")
          echo "API response: ${RESPONSE}"
          DEPLOY_ID=$(echo "${RESPONSE}" | python3 -c \
            "import sys,json; print(json.loads(sys.stdin.read().strip()).get('id',''))" 2>/dev/null || echo "")
          echo "deploy_id=${DEPLOY_ID}" >> "$GITHUB_OUTPUT"

      - name: Wait for deploy to go live
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ vars.RENDER_SERVICE_ID }}
          DEPLOY_ID: ${{ steps.render.outputs.deploy_id }}
        run: |
          if [ -z "${DEPLOY_ID}" ]; then
            echo "No deploy ID -- waiting 5 min for deploy to settle..."
            sleep 300
            exit 0
          fi
          echo "Polling deploy ${DEPLOY_ID} (max 15 min)..."
          for i in $(seq 1 45); do
            sleep 20
            STATUS=$(curl -sf \
              "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys/${DEPLOY_ID}" \
              -H "Authorization: Bearer ${RENDER_API_KEY}" | \
              python3 -c "import sys,json; print(json.load(sys.stdin).get('status','?'))")
            echo "[${i}/45] ${STATUS}"
            if [ "$STATUS" = "live" ]; then
              echo "Deploy is live!"
              exit 0
            fi
            if [ "$STATUS" = "update_failed" ] || [ "$STATUS" = "deactivated" ] || [ "$STATUS" = "build_failed" ]; then
              echo "Deploy failed with status: ${STATUS}"
              exit 1
            fi
          done
          echo "Polling timed out after 15 min"
          exit 1
