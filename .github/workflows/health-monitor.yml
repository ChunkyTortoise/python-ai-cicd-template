# =============================================================================
# Health Monitor: 24/7 Uptime Check
# =============================================================================
# Pings your live service every 30 minutes. On failure, opens a GitHub issue
# with triage links. On recovery, auto-closes the issue.
#
# Also keeps Render free-tier services warm (prevents cold-start spin-down).
#
# Required variables:
#   - SERVICE_URL: Your live service base URL (e.g., https://my-app.onrender.com)
#
# Customize:
#   - Adjust cron schedule for more/less frequent checks
#   - Add endpoint-specific checks (OpenAPI, auth, etc.)
#   - Add Slack/PagerDuty notifications on failure
# =============================================================================

name: Health Monitor

on:
  schedule:
    - cron: "*/30 * * * *"  # Every 30 minutes
  workflow_dispatch:
    inputs:
      verbose:
        description: "Print full JSON responses"
        required: false
        type: boolean
        default: false

concurrency:
  group: health-monitor
  cancel-in-progress: true

jobs:
  health-check:
    name: Live Endpoint Smoke Tests
    runs-on: ubuntu-latest
    env:
      # TODO: Set SERVICE_URL in GitHub repo variables
      BASE_URL: ${{ vars.SERVICE_URL || 'https://YOUR_SERVICE.onrender.com' }}

    steps:
      - name: Wake service (free-tier spin-up)
        id: wake
        run: |
          echo "Waking service at $BASE_URL..."
          for attempt in 1 2 3; do
            STATUS=$(curl -s --max-time 60 -o /dev/null -w "%{http_code}" "$BASE_URL/health")
            echo "Attempt $attempt -- HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "awake=true" >> "$GITHUB_OUTPUT"
              break
            fi
            sleep 15
          done
          if [ "$STATUS" != "200" ]; then
            echo "awake=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Health check detail
        if: steps.wake.outputs.awake == 'true'
        run: |
          RESP=$(curl -s --max-time 20 "$BASE_URL/health")
          echo "Response: $RESP"
          echo "$RESP" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          status = d.get('status', d.get('healthy', ''))
          assert status in ('healthy', 'ok', True), f'Unexpected status: {d}'
          print('PASS health check')
          "

      - name: Verify OpenAPI spec exists
        if: steps.wake.outputs.awake == 'true'
        run: |
          STATUS=$(curl -s --max-time 20 -o /dev/null -w "%{http_code}" "$BASE_URL/openapi.json")
          if [ "$STATUS" = "200" ]; then
            echo "PASS OpenAPI spec available"
          else
            echo "WARN OpenAPI spec returned HTTP $STATUS (non-blocking)"
          fi

      - name: Service unreachable
        if: steps.wake.outputs.awake != 'true'
        run: |
          echo "FAIL: $BASE_URL unreachable after 3 wake attempts"
          exit 1

      - name: Open GitHub issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Health monitor failed -- ' + new Date().toISOString().slice(0,16) + ' UTC';
            const body = [
              '## Live monitor detected a failure',
              '',
              '**Run:** ' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId,
              '',
              '**Service URL:** ' + process.env.BASE_URL,
              '',
              '_Auto-opened by health-monitor.yml_',
            ].join('\n');
            const {data: issues} = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              labels: 'monitor-alert', state: 'open', per_page: 1,
            });
            if (issues.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ['monitor-alert', 'bug'],
              });
            }

      - name: Close alert issue on recovery
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const {data: issues} = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              labels: 'monitor-alert', state: 'open', per_page: 5,
            });
            for (const issue of issues) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue.number,
                body: 'Service recovered at ' + new Date().toISOString().slice(0,16) + ' UTC. Closing.',
              });
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue.number, state: 'closed',
              });
            }
